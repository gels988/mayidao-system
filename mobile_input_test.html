<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Input Test</title>
    <style>
        body { padding: 20px; font-family: sans-serif; background: #f0f0f0; }
        .box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; font-size: 16px; color: #333; }
        input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .cell { background: #eee; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; user-select: none; }
        .cell.active { background: #007bff; color: white; }
        .btn { display: block; width: 100%; padding: 12px; background: #28a745; color: white; text-align: center; border: none; border-radius: 4px; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-blue { background: #007bff; }
        #result { margin-top: 10px; color: #666; font-size: 14px; min-height: 20px; }
    </style>
    <script src="js/mobile_debug.js"></script>
</head>
<body>

<div class="box">
    <h2>1. 输入测试</h2>
    <input type="text" id="test-input" placeholder="点击输入文字...">
    <div id="input-result" style="margin-top:10px; color:blue;"></div>
</div>

<div class="box">
    <h2>2. 网格触摸测试</h2>
    <div class="grid">
        <div class="cell" data-id="1">1</div>
        <div class="cell" data-id="2">2</div>
        <div class="cell" data-id="3">3</div>
        <div class="cell" data-id="4">4</div>
    </div>
    <div id="grid-result" style="margin-top:10px; color:blue;"></div>
</div>

<div class="box">
    <h2>3. 按钮测试</h2>
    <button class="btn" onclick="showSuccess()">点击测试按钮</button>
    <button class="btn btn-blue" onclick="showAlert()">弹出提示测试</button>
</div>

<script>
    // Input Test
    const input = document.getElementById('test-input');
    const inputRes = document.getElementById('input-result');
    
    input.addEventListener('input', (e) => {
        inputRes.textContent = '当前输入: ' + e.target.value;
        console.log('Input event:', e.target.value);
    });

    // Grid Test
    const cells = document.querySelectorAll('.cell');
    const gridRes = document.getElementById('grid-result');
    
    cells.forEach(cell => {
        // Touch start
        cell.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Prevent mouse emulation
            this.classList.toggle('active');
            updateGridResult();
            console.log('Touch start:', this.dataset.id);
        });
        
        // Click (fallback)
        cell.addEventListener('click', function() {
            this.classList.toggle('active');
            updateGridResult();
            console.log('Click:', this.dataset.id);
        });
    });

    function updateGridResult() {
        const active = document.querySelectorAll('.cell.active');
        const ids = Array.from(active).map(c => c.dataset.id);
        gridRes.textContent = '选中网格: ' + (ids.length ? ids.join(', ') : '无');
    }

    // Button Test
    function showSuccess() {
        const div = document.createElement('div');
        div.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.8); color:white; padding:15px; border-radius:5px;';
        div.textContent = '✅ 按钮点击成功';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 1500);
        console.log('Button clicked');
    }

    function showAlert() {
        alert('这是原生 Alert 对话框测试');
        console.log('Alert shown');
    }
</script>

</body>
</html>
