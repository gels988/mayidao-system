<!DOCTYPE html> 
<html lang="zh-CN"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>手机端访问故障排查工具</title> 
    <style> 
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; line-height: 1.6; } 
        .card { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; } 
        .status-ok { color: green; font-weight: bold; } 
        .status-error { color: red; font-weight: bold; } 
        pre { background: #eee; padding: 10px; overflow-x: auto; font-size: 12px; } 
        button { background: #007BFF; color: white; border: none; padding: 10px 20px; border-radius: 5px; width: 100%; } 
    </style> 
</head> 
<body> 

    <h2>🛠 访问诊断报告</h2> 
    
    <div class="card"> 
        <h3>1. 基本连接信息</h3> 
        <p>访问网址: <span id="url"></span></p> 
        <p>协议: <span id="protocol"></span></p> 
        <p>HTTPS 状态: <span id="ssl-status">检测中...</span></p> 
    </div> 

    <div class="card"> 
        <h3>2. 设备环境 (User-Agent)</h3> 
        <pre id="ua"></pre> 
    </div> 

    <div class="card"> 
        <h3>3. 资源加载检测</h3> 
        <ul id="resource-list"> 
            <li>正在检测云端资源响应...</li> 
        </ul> 
    </div> 

    <button onclick="location.reload()">重新检测</button> 

    <script> 
        // 获取基本信息 
        document.getElementById('url').innerText = window.location.href; 
        document.getElementById('protocol').innerText = window.location.protocol; 
        document.getElementById('ua').innerText = navigator.userAgent; 

        // 检测 SSL 
        const isHttps = window.location.protocol === 'https:'; 
        const sslEl = document.getElementById('ssl-status'); 
        if (isHttps) { 
            sslEl.innerText = "已开启加密 (HTTPS)"; 
            sslEl.className = "status-ok"; 
        } else { 
            sslEl.innerText = "未加密 (HTTP) - 建议检查云端 443 端口"; 
            sslEl.className = "status-error"; 
        } 

        // 检测资源加载（尝试加载一个不存在的小文件来测试服务器响应） 
        fetch('./favicon.ico').then(res => { 
            const list = document.getElementById('resource-list'); 
            if(res.ok) { 
                list.innerHTML = '<li class="status-ok">✅ 服务器响应正常 (Status 200)</li>'; 
            } else { 
                list.innerHTML = '<li class="status-error">❌ 服务器响应异常 (Status: ' + res.status + ')</li>'; 
            } 
        }).catch(err => { 
            document.getElementById('resource-list').innerHTML = '<li class="status-error">❌ 无法连接到服务器: ' + err.message + '</li>'; 
        }); 
    </script> 
</body> 
</html>
