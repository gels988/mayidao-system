<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机端捐赠</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db_client.js"></script>
    <script src="../js/shared_identity.js"></script>
    <style>
        body {
            margin: 0;
            background: #070a12;
            color: #f5f7fb;
            font-family: Arial, sans-serif;
        }
        .page {
            max-width: 480px;
            margin: 0 auto;
            padding: 18px 16px 30px;
        }
        .card {
            background: #101722;
            border: 1px solid #223048;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
        }
        h1, h2 {
            margin: 0 0 12px;
        }
        .muted {
            color: #92a1b8;
            font-size: 13px;
            line-height: 1.6;
        }
        .row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 0;
            border-top: 1px solid #1b2638;
            font-size: 14px;
        }
        .row:first-child {
            border-top: none;
            padding-top: 0;
        }
        .value {
            color: #ffd166;
            text-align: right;
            word-break: break-all;
        }
        .qr-wrap {
            background: #fff;
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        img {
            max-width: 100%;
            border-radius: 8px;
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 12px;
        }
        button, a {
            display: block;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            padding: 13px 12px;
            border-radius: 12px;
            font-weight: bold;
            border: none;
            text-decoration: none;
            cursor: pointer;
        }
        .primary { background: #2ea043; color: #fff; }
        .secondary { background: #1b2434; color: #dde7f5; border: 1px solid #32435c; }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>手机端捐赠</h1>
            <p class="muted">移动端保留独立捐赠页面，但身份与余额仍与电脑端同步。需要完整提交记录时，可切回电脑端完成。</p>
        </div>

        <div class="card">
            <h2>当前身份</h2>
            <div class="row"><span>显示名称</span><span class="value" id="userName">加载中...</span></div>
            <div class="row"><span>邮箱/手机</span><span class="value" id="userContact">加载中...</span></div>
            <div class="row"><span>当前 G-Gas</span><span class="value" id="userGas">180</span></div>
        </div>

        <div class="card">
            <h2>收款信息</h2>
            <div class="qr-wrap">
                <img src="./donation_qr.jpg" alt="移动端捐赠二维码">
            </div>
            <div class="row"><span>网络</span><span class="value">Ethereum USDT</span></div>
            <div class="row"><span>地址</span><span class="value" id="walletAddress">待配置</span></div>
            <div class="actions">
                <button class="primary" type="button" onclick="copyAddress()">复制地址</button>
                <a class="secondary" href="./portal.html">返回手机端</a>
            </div>
        </div>
    </div>

    <script>
        let FIXED_WALLET = '';

        function renderProfile(profile) {
            const safeProfile = profile || {};
            document.getElementById('userName').textContent = safeProfile.display_name || safeProfile.email || safeProfile.phone || '未登录';
            document.getElementById('userContact').textContent = safeProfile.email || safeProfile.phone || '请先在电脑端登录';
            document.getElementById('userGas').textContent = String(safeProfile.gas_balance ?? 180);
        }

        async function refreshProfile() {
            if (window.loadMayijuRuntimeConfig) {
                const config = await window.loadMayijuRuntimeConfig();
                FIXED_WALLET = config?.donationWallet || '';
                document.getElementById('walletAddress').textContent = FIXED_WALLET || '请由管理员配置 DONATION_WALLET';
            }
            const profile = window.MayijuIdentity
                ? await window.MayijuIdentity.syncProfile({ device: 'mobile' })
                : null;
            renderProfile(profile);
        }

        async function copyAddress() {
            if (!FIXED_WALLET) {
                alert('未配置捐赠地址，请联系管理员设置 DONATION_WALLET');
                return;
            }
            try {
                await navigator.clipboard.writeText(FIXED_WALLET);
                alert('钱包地址已复制');
            } catch (error) {
                alert('复制失败，请手动复制');
            }
        }

        window.addEventListener('mayiju-profile-updated', (event) => renderProfile(event.detail));
        window.addEventListener('DOMContentLoaded', refreshProfile);
    </script>
</body>
</html>
