<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蚂蚁岛预测系统 - API服务</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #0070f3;
            margin-bottom: 1rem;
        }
        p {
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            background-color: #e6fffa;
            color: #00bfa5;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        code {
            background-color: #f1f5f9;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
        }
        .update-time {
            font-size: 0.8rem;
            color: #888;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">系统运行中</div>
        <h1>API 服务端点</h1>
        <p>蚂蚁岛预测系统后端 API 已就绪。</p>
        <p>鉴于安全策略，管理看板与可视化模块仅允许从<b>本地授权客户端</b>访问。</p>
        <p>请在本地环境打开 <code>数据库资料.html</code> 进行操作。</p>
        <div class="update-time">最后更新: 2026-02-09 (Version 2.0.1)</div>
    </div>
</body>
</html>
