<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开始试玩 - MAYIJU</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.12) 0, transparent 45%),
                radial-gradient(circle at 80% 10%, rgba(255, 0, 80, 0.18) 0, transparent 55%),
                radial-gradient(circle at 50% 120%, rgba(255, 0, 0, 0.4) 0, transparent 65%),
                linear-gradient(160deg, #03030b 0%, #050018 45%, #020007 100%);
            color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.06) 0, rgba(0, 0, 0, 0.8) 60%, rgba(0, 0, 0, 0.9) 100%);
            padding: 2.4rem 2rem 2.2rem;
            border-radius: 18px;
            box-shadow:
                0 0 35px rgba(255, 0, 80, 0.45),
                0 18px 40px rgba(0, 0, 0, 0.85);
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 0, 80, 0.55);
        }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 0.8rem;
            color: #ff4b4b;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            text-shadow:
                0 0 12px rgba(255, 75, 75, 0.9),
                0 0 24px rgba(255, 0, 60, 0.9);
        }
        .subtitle {
            font-size: 1.2rem;
            color: #66ccff;
            margin-bottom: 1.8rem;
            letter-spacing: 0.08em;
        }
        input[type="tel"] {
            width: 100%;
            padding: 1.1rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 80, 80, 0.75);
            font-size: 1.05rem;
            margin-bottom: 1.2rem;
            box-sizing: border-box;
            background: radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.06) 0, rgba(3, 3, 10, 0.95) 55%);
            color: #ffeaea;
            box-shadow:
                0 0 0 1px rgba(255, 0, 60, 0.35),
                0 0 24px rgba(255, 0, 60, 0.45);
        }
        input[type="tel"]::placeholder {
            color: rgba(255, 180, 180, 0.75);
        }
        input[type="tel"]:focus {
            outline: none;
            box-shadow:
                0 0 0 1px rgba(255, 50, 90, 0.9),
                0 0 38px rgba(255, 0, 80, 0.9);
            border-color: rgba(255, 120, 120, 1);
        }
        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ff1744 0%, #ff6d00 45%, #ff1744 100%);
            color: #ffffff;
            border: none;
            border-radius: 999px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow:
                0 0 18px rgba(255, 50, 90, 0.85),
                0 10px 32px rgba(0, 0, 0, 0.9);
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        button:active {
            transform: translateY(1px);
            box-shadow:
                0 0 10px rgba(255, 50, 90, 0.7),
                0 6px 20px rgba(0, 0, 0, 0.85);
        }
        button:disabled {
            background: linear-gradient(135deg, #4a4a4a 0%, #777777 100%);
            box-shadow: none;
            cursor: not-allowed;
        }
        .note {
            font-size: 0.85rem;
            color: rgba(240, 208, 208, 0.9);
            margin-top: 1.1rem;
        }
        .error-text {
            font-size: 0.85rem;
            color: #ff616f;
            min-height: 1.2rem;
            margin-top: 0.55rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>输入联系方式开始试玩</h1>
        <div class="subtitle">在黑暗中走红的开始</div>
        <input type="tel" id="phoneInput" placeholder="例如：手机号 / 邮箱 " maxlength="64">
        <button id="submitBtn" type="button">领取 180 分试玩</button>
        <div id="errorText" class="error-text"></div>
        <p class="note">仅用于绑定试玩账户，不发送短信，是您身份的标识</p>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/register_logic.js"></script>
</body>
</html>
