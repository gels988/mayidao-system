<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>账号注册 - MAYIJU</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.12) 0, transparent 45%),
                radial-gradient(circle at 80% 10%, rgba(255, 0, 80, 0.18) 0, transparent 55%),
                radial-gradient(circle at 50% 120%, rgba(255, 0, 0, 0.4) 0, transparent 65%),
                linear-gradient(160deg, #03030b 0%, #050018 45%, #020007 100%);
            color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.06) 0, rgba(0, 0, 0, 0.8) 60%, rgba(0, 0, 0, 0.9) 100%);
            padding: 2.4rem 2rem 2.2rem;
            border-radius: 18px;
            box-shadow:
                0 0 35px rgba(255, 0, 80, 0.45),
                0 18px 40px rgba(0, 0, 0, 0.85);
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 0, 80, 0.55);
        }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 0.8rem;
            color: #ff4b4b;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            text-shadow:
                0 0 12px rgba(255, 75, 75, 0.9),
                0 0 24px rgba(255, 0, 60, 0.9);
        }
        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }
        label {
            color: #a2a8d3;
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 1.1rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 80, 80, 0.75);
            font-size: 1.05rem;
            margin-bottom: 0.5rem;
            box-sizing: border-box;
            background: radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.06) 0, rgba(3, 3, 10, 0.95) 55%);
            color: #ffeaea;
            box-shadow:
                0 0 0 1px rgba(255, 0, 60, 0.35),
                0 0 24px rgba(255, 0, 60, 0.45);
        }
        input::placeholder {
            color: rgba(255, 180, 180, 0.5);
        }
        input:focus {
            outline: none;
            box-shadow:
                0 0 0 1px rgba(255, 50, 90, 0.9),
                0 0 38px rgba(255, 0, 80, 0.9);
            border-color: rgba(255, 120, 120, 1);
        }
        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ff1744 0%, #ff6d00 45%, #ff1744 100%);
            color: #ffffff;
            border: none;
            border-radius: 999px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow:
                0 0 18px rgba(255, 50, 90, 0.85),
                0 10px 32px rgba(0, 0, 0, 0.9);
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 1rem;
        }
        button:active {
            transform: translateY(1px);
        }
        .secondary-btn {
            background: transparent;
            border: 1px solid #533483;
            box-shadow: none;
            color: #a2a8d3;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        .message {
            margin-top: 15px;
            text-align: center;
            color: #ffd700;
            min-height: 24px;
            font-size: 0.9rem;
        }
    </style>
    <script src="js/shared_identity.js"></script>
</head>
<body>
    <div class="container">
        <h1>📝 账号注册</h1>
        
        <div class="form-group">
            <label>邮箱（推荐）</label>
            <input type="email" id="register-email" placeholder="输入邮箱地址">
        </div>

        <div class="form-group">
            <label>手机号（可选）</label>
            <input type="tel" id="register-phone" placeholder="输入手机号">
        </div>

        <div class="form-group">
            <label>设置密码</label>
            <input type="password" id="register-password" placeholder="输入密码（至少6位）">
        </div>

        <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="register-confirm" placeholder="再次输入密码">
        </div>

        <button onclick="handleRegister()">✅ 立即注册</button>
        <button class="secondary-btn" onclick="window.location.href='index.html'">← 返回首页登录</button>
        
        <div id="register-message" class="message"></div>
    </div>

    <script src="js/db_client.js"></script>
<script>
        let inviteReferrerId = null;
        (function () {
            try {
                const params = new URLSearchParams(window.location.search);
                const ref = params.get('ref');
                if (ref) {
                    inviteReferrerId = ref;
                    localStorage.setItem('invite_referrer_id', ref);
                }
            } catch (e) {}
        })();

        async function handleRegister() {
            const email = document.getElementById('register-email').value.trim();
            const phone = document.getElementById('register-phone').value.trim();
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const messageEl = document.getElementById('register-message');
            
            // 验证输入
            if (!email && !phone) {
                messageEl.textContent = '❌ 邮箱或手机号至少填一项';
                messageEl.style.color = '#ff4444';
                return;
            }
            
            if (!password || password.length < 6) {
                messageEl.textContent = '❌ 密码至少6位';
                messageEl.style.color = '#ff4444';
                return;
            }
            
            if (password !== confirm) {
                messageEl.textContent = '❌ 两次密码不一致';
                messageEl.style.color = '#ff4444';
                return;
            }
            
            messageEl.textContent = '⏳ 注册中...';
            messageEl.style.color = '#ffd700';
            
            try {
                const newUser = {
                    id: 'USER_' + Math.floor(Math.random() * 100000),
                    email,
                    phone,
                    balance_g: 180,
                    created_at: new Date().toISOString(),
                    referrer_id: inviteReferrerId || localStorage.getItem('invite_referrer_id') || null
                };

                const supabase = window.supabaseInstance;
                let persistedUser = null;

                if (supabase) {
                    const appUsersPayload = {
                        email: email || null,
                        phone_number: phone || null,
                        balance_g: 180,
                        referrer_id: newUser.referrer_id,
                        created_at: new Date().toISOString()
                    };
                    const usersPayload = {
                        email: email || null,
                        phone: phone || null,
                        password_hash: password,
                        balance_g: 180,
                        referrer_id: newUser.referrer_id,
                        created_at: new Date().toISOString()
                    };

                    try {
                        const appUserRes = await supabase
                            .from('app_users')
                            .insert(appUsersPayload)
                            .select()
                            .single();
                        if (!appUserRes.error && appUserRes.data) {
                            persistedUser = {
                                id: appUserRes.data.id,
                                email: appUserRes.data.email || email,
                                phone: appUserRes.data.phone_number || phone,
                                balance_g: appUserRes.data.balance_g || 180
                            };
                        }
                    } catch (error) {}

                    if (!persistedUser) {
                        try {
                            const usersRes = await supabase
                                .from('users')
                                .insert(usersPayload)
                                .select()
                                .single();
                            if (!usersRes.error && usersRes.data) {
                                persistedUser = {
                                    id: usersRes.data.id,
                                    email: usersRes.data.email || email,
                                    phone: usersRes.data.phone || phone,
                                    balance_g: usersRes.data.balance_g || usersRes.data.gas_balance || 180
                                };
                            }
                        } catch (error) {}
                    }
                }

                // 检查是否已存在
                const storedUsers = JSON.parse(localStorage.getItem('registered_users') || '[]');
                if (email && storedUsers.some(u => u.email === email)) throw new Error("该邮箱已被注册");
                if (phone && storedUsers.some(u => u.phone === phone)) throw new Error("该手机号已被注册");

                storedUsers.push({ ...newUser, password });
                localStorage.setItem('registered_users', JSON.stringify(storedUsers));
                
                // 自动登录
                const currentUser = {
                    id: persistedUser?.id || newUser.id,
                    email: persistedUser?.email || newUser.email,
                    phone: persistedUser?.phone || newUser.phone,
                    gas_balance: 180
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                if (window.MayijuIdentity) {
                    window.MayijuIdentity.saveProfile(currentUser, { device: 'desktop', silent: true });
                }
                
                messageEl.textContent = '✅ 注册成功！正在跳转...';
                messageEl.style.color = '#00cc66';
                
                // 延迟跳转
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                console.error(error);
                messageEl.textContent = `❌ ${error.message}`;
                messageEl.style.color = '#ff4444';
            }
        }
    </script>
</body>
</html>
